steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build frontend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/frontend:latest'
      - './frontend'

images:
  - 'gcr.io/$PROJECT_ID/backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/backend:latest'
  - 'gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/frontend:latest'
